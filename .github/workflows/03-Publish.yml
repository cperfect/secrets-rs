name: Publish

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify crate version matches release tag
        shell: bash
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "secrets-rs") | .version')
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$CRATE_VERSION" != "$TAG" ]; then
            echo "Version mismatch: Cargo.toml has $CRATE_VERSION but release tag is $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Publish secrets-rs-macros
        run: cargo publish -p secrets-rs-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # crates.io needs a moment to index the macros crate before secrets-rs can depend on it
      - name: Wait for secrets-rs-macros to be indexed
        run: sleep 20

      - name: Publish secrets-rs
        run: cargo publish -p secrets-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
