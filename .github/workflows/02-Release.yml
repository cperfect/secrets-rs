name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3, without v prefix)"
        required: true
        type: string

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches Cargo.toml
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "secrets-rs") | .version')
          if [ "$CRATE_VERSION" != "${{ inputs.version }}" ]; then
            echo "Version mismatch: Cargo.toml has $CRATE_VERSION but input is ${{ inputs.version }}"
            exit 1
          fi

      - name: Create GitHub Release
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
